name: batch_diffusion_teachers_down_quarter_up_restore_sr_hr_img5
runtime:
  device: cuda
  resume: false
  seed: 1234
paths:
  input_root: D:/repository/SR_DATA_MAKER/.worktrees/degradation-engineering/data/outputs/down_quarter_up_restore_sr_hr_img5/degraded/down_quarter_up_restore_sr_hr_img5
  output_root: D:/repository/SR_DATA_MAKER/.worktrees/degradation-engineering/data/outputs/down_quarter_up_restore_sr_hr_img5/diffusion_teachers
source:
  type: ImageFolderSourceReader
  recursive: true
  exts: [jpg, jpeg, png, webp]
tasks:
  - name: teacher_sr_stablesr
    enabled: true
    type: TeacherSRGenerator
    runner:
      type: StableSRRunner
    model:
      name: StableSR_x4
      weights: ./weights/stablesr/stablesr_turbo.ckpt
      vqgan_weights: ./weights/stablesr/vqgan_cfw_00011.ckpt
      python_executable: ./.conda/stablesr-py310/python.exe
      repo_root: ./third_party/StableSR
      scale: 4
      steps: 4
      precision: fp16
      color_fix_type: wavelet
      input_size: 512
      tile_overlap: 32
      vqgan_tile_size: 512
      vqgan_tile_stride: 256
      config_path: ./third_party/StableSR/configs/stableSRNew/v2-finetune_text_T_512.yaml
    output:
      folder_name: StableSR_x4
      target_type: pseudo_gt
  - name: teacher_sr_resshift
    enabled: true
    type: TeacherSRGenerator
    runner:
      type: ResShiftRunner
    model:
      name: ResShift_x4
      weights: ./weights/resshift/resshift_realsrx4_s4_v3.pth
      autoencoder_weights: ./weights/resshift/autoencoder_vq_f4.pth
      repo_root: ./third_party/ResShift
      scale: 4
      steps: 4
      version: v3
      task: realsr
      chop_size: 64
      chop_stride: 32
      precision: fp16
    output:
      folder_name: ResShift_x4
      target_type: pseudo_gt
  - name: teacher_sr_supir
    enabled: true
    type: TeacherSRGenerator
    runner:
      type: SUPIRRunner
    model:
      name: SUPIR_x4
      weights: ./weights/supir/SUPIR-v0Q.ckpt
      repo_root: ./third_party/SUPIR
      opt_path: ./third_party/SUPIR/options/SUPIR_v0.yaml
      python_executable: ./.conda/stablesr-py310/python.exe
      scale: 1
      steps: 20
      precision: fp16
      supir_sign: Q
      prompt: clean realistic photo
      negative_prompt: oversmoothed, blurry
      color_fix_type: Wavelet
      no_llava: true
      loading_half_params: true
      use_tile_vae: true
      encoder_tile_size: 192
      decoder_tile_size: 32
      min_size: 256
      ae_dtype: bf16
      diff_dtype: fp16
    output:
      folder_name: SUPIR_x4
      target_type: pseudo_gt
