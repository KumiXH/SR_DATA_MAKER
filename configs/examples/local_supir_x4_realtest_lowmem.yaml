name: local_supir_x4_realtest_lowmem
runtime:
  device: cuda
  resume: false
  seed: 1234
paths:
  input_root: C:/Users/kumi/Desktop/SR_HR_IMG_5/LR
  output_root: ./data/outputs/local_supir_x4_realtest_lowmem
source:
  type: ImageFolderSourceReader
  recursive: true
  exts: [jpg, jpeg, png, webp]
tasks:
  - name: teacher_sr_supir
    enabled: true
    type: TeacherSRGenerator
    runner:
      type: SUPIRRunner
    model:
      name: SUPIR_x4
      weights: ./weights/supir/SUPIR-v0Q.ckpt
      repo_root: ./third_party/SUPIR
      opt_path: ./third_party/SUPIR/options/SUPIR_v0.yaml
      scale: 1
      steps: 20
      precision: fp16
      supir_sign: Q
      prompt: clean realistic photo
      negative_prompt: oversmoothed, blurry
      color_fix_type: Wavelet
      no_llava: true
      loading_half_params: true
      use_tile_vae: true
      encoder_tile_size: 192
      decoder_tile_size: 32
      min_size: 256
      ae_dtype: bf16
      diff_dtype: fp16
      download_url: https://example.test/manual-supir-checkpoint.ckpt
    output:
      folder_name: SUPIR_x4
      target_type: pseudo_gt
